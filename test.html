<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>인사 프로그램</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
 
    body {
      font-family: 'Segoe UI', sans-serif;
      background: #f0f4f8;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
    }
 
    .card {
      background: #fff;
      border-radius: 16px;
      padding: 2.5rem 2rem;
      width: 100%;
      max-width: 380px;
      box-shadow: 0 4px 24px rgba(0,0,0,0.08);
      text-align: center;
    }
 
    h1 {
      font-size: 22px;
      font-weight: 600;
      color: #1a1a1a;
      margin-bottom: 1.5rem;
    }
 
    input[type="text"] {
      width: 100%;
      padding: 12px 16px;
      font-size: 15px;
      border: 1.5px solid #ddd;
      border-radius: 10px;
      outline: none;
      transition: border-color 0.2s;
      margin-bottom: 12px;
    }
 
    input[type="text"]:focus {
      border-color: #4f7ef7;
    }
 
    button {
      width: 100%;
      padding: 12px;
      font-size: 15px;
      font-weight: 600;
      color: #fff;
      background: #4f7ef7;
      border: none;
      border-radius: 10px;
      cursor: pointer;
      transition: background 0.2s, transform 0.1s;
    }
 
    button:hover { background: #3a67e0; }
    button:active { transform: scale(0.98); }
 
    .greeting {
      display: none;
      margin-top: 1.25rem;
      padding: 14px;
      background: #eef3ff;
      border-radius: 10px;
      font-size: 17px;
      font-weight: 500;
      color: #3a67e0;
    }
 
    .warning {
      background: #fff8e1;
      color: #c8900a;
    }
  </style>
</head>
<body>
 
<div class="card">
  <h1>👋 인사 프로그램</h1>
  <input type="text" id="nameInput" placeholder="이름을 입력하세요" onkeydown="if(event.key==='Enter') greet()">
  <button onclick="greet()">인사하기</button>
  <div class="greeting" id="greetingBox"></div>
</div>
 
<script>
  function greet() {
    const name = document.getElementById('nameInput').value.trim();
    const box = document.getElementById('greetingBox');
 
    if (!name) {
      box.textContent = '⚠️ 이름을 입력해 주세요!';
      box.className = 'greeting warning';
      box.style.display = 'block';
      return;
    }
 
    box.textContent = '안녕하세요, ' + name + '님! 😊';
    box.className = 'greeting';
    box.style.display = 'block';
  }
</script>
 
</body>
</html>
